name: Release

# Builds binary wheels for every supported CPython on Linux/macOS/Windows plus
# the sdist, then publishes to PyPI via Trusted Publishing (OIDC, no API token).
# Runs when a GitHub Release is published. As with ci.yml, this activates once
# coxstream is its own repository (workflows run only from the repo root).
#
# One-time PyPI setup (Project -> Settings -> Publishing -> Add a pending/
# trusted publisher):
#   Owner: tommycarstensen   Repo: coxstream
#   Workflow: release.yml     Environment: pypi
#
# NOTE: confirm the cibuildwheel and action versions below are current before
# the first release; bump the pins if newer ones exist.

on:
  release:
    types: [published]

jobs:
  build_wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Native runners for every wheel arch -- no QEMU/cross-compile.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* *_i686 *-win32"
          CIBW_ARCHS: "auto64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
